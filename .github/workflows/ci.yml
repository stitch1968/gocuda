name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  simulation:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run simulation tests
        run: go test ./...

  cuda-self-hosted:
    runs-on: [self-hosted, cuda, gpu]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify toolkit
        run: go run ./cmd/gocuda-verify-toolkit
      - name: Run diagnostics
        run: go run ./cmd/gocuda-diagnostics
      - name: Run CUDA-tagged tests
        run: go test -tags cuda ./...
      - name: Run native smoke
        run: go run -tags cuda ./cmd/gocuda-native-smoke